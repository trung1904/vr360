<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VR360 (krpano)</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      #pano {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body style="">
    <script src="hanoionline.js"></script>

    <div id="pano" style="width: 100%; height: 100%">
      <noscript>
        <table style="width: 100%; height: 100%">
          <tr style="vertical-align: middle">
            <td>
              <div style="text-align: center">
                ERROR:<br /><br />
                Javascript not activated<br /><br />
              </div>
            </td>
          </tr>
        </table>
      </noscript>

      <script>
        // Hiển thị lỗi rõ ràng thay vì màn hình đen
        (function () {
          const showError = (msg) => {
            const el = document.createElement("div");
            el.style.position = "absolute";
            el.style.inset = "0";
            el.style.display = "grid";
            el.style.placeItems = "center";
            el.style.padding = "24px";
            el.style.color = "rgba(255,255,255,0.92)";
            el.style.background = "radial-gradient(900px 600px at 50% 35%, rgba(40,60,110,0.35), rgba(0,0,0,0.92))";
            el.style.fontFamily =
              'ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji"';
            el.innerHTML =
              `<div style="max-width: 860px; border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; padding: 16px 18px; background: rgba(0,0,0,0.28); backdrop-filter: blur(6px);">` +
              `<div style="font-weight: 700; font-size: 16px; margin-bottom: 8px;">Không load được VR360</div>` +
              `<div style="opacity: 0.9; line-height: 1.45;">${msg}</div>` +
              `<div style="margin-top: 10px; opacity: 0.8; font-size: 12px;">Nếu đang chạy bằng URL gốc mà vẫn lỗi, khả năng do mạng/chặn tài nguyên từ máy chủ VR360.</div>` +
              `</div>`;
            document.body.appendChild(el);
          };

          if (typeof window.embedpano !== "function") {
            showError(
              `Thiếu <code>hanoionline.js</code> (hoặc file JS chưa load được).<br/>` +
                `Hãy đặt file <code>hanoionline.js</code> cạnh <code>vr360.html</code> rồi reload.`
            );
            return;
          }

          try {
            window.embedpano({ xml: "hanoionline.xml", target: "pano", passQueryParameters: "startscene,startlookat" });
          } catch (e) {
            showError(
              `Gọi <code>embedpano()</code> bị lỗi: <code>${String(e && e.message ? e.message : e)}</code><br/>` +
                `Khả năng cao là thiếu <code>hanoionline.xml</code> hoặc các asset pano/skin.`
            );
          }
        })();
      </script>
    </div>

    <style>
      #webview_popup_container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: none;
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      #webview_popup_box {
        position: relative;
        width: 90%;
        height: 90%;
        background-color: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      }
      #webview_iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      #webview_close_button {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 30px;
        height: 30px;
        background-color: black;
        color: white;
        border: 1px solid white;
        border-radius: 50%;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        line-height: 28px;
        cursor: pointer;
        z-index: 10;
      }
    </style>

    <div id="webview_popup_container">
      <div id="webview_popup_box">
        <div id="webview_close_button" onclick="closeWebPopup()">×</div>
        <iframe id="webview_iframe" src=""></iframe>
      </div>
    </div>

    <script>
      function openWebPopup(url) {
        document.getElementById("webview_iframe").src = url;
        document.getElementById("webview_popup_container").style.display = "flex";
      }

      function closeWebPopup() {
        document.getElementById("webview_popup_container").style.display = "none";
        document.getElementById("webview_iframe").src = "about:blank";
      }
    </script>
  </body>
</html>
